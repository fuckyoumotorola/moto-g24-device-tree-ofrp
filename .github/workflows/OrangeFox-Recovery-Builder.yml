name: OrangeFox - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "OrangeFox Branch"
        required: true
        default: "12.1"
        type: choice
        options:
          - "14.1"
          - "12.1"
          - "11.0"

      DEVICE_TREE:
        description: "Custom Recovery Tree"
        required: true
        default: "https://github.com/kinguser981/android_device_xiaomi_marble-OFRP"

      DEVICE_TREE_BRANCH:
        description: "Custom Recovery Tree Branch"
        required: true
        default: "fox_12.1"

      DEVICE_PATH:
        description: "Specify your device path."
        required: true
        default: "device/xiaomi/marble"

      DEVICE_NAME:
        description: "Specify your Device Codename."
        required: true
        default: "marble"

      BUILD_TARGET:
        description: "Specify your Build Target"
        required: true
        default: "recovery"
        type: choice
        options:
          - "boot"
          - "recovery"
          - "vendorboot"

      LDCHECK:
        description: "Path of blobs to check"
        required: true
        default: "system/bin/qseecomd"

      RECOVERY_TAR:
        description: "Release recovery.tar For Samsung devices"
        required: false
        default: false
        type: boolean

      RECOVERY_INSTALLER:
        description: "Include recovery installer zip"
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Display Inputs
        run: |
          echo "::group::User Environment Variables"
          echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
          echo "Device Tree: ${{ github.event.inputs.DEVICE_TREE }}"
          echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
          echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
          echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}"
          echo "Include Recovery Installer: ${{ github.event.inputs.RECOVERY_INSTALLER }}"
          echo "Release recovery.tar For Samsung devices: ${{ github.event.inputs.RECOVERY_TAR }}"
          echo "::endgroup::"

      - name: Clean-up
        uses: rokibhasansagar/slimhub_actions@main

      - name: Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 \
            python-is-python3 bc ccache libssl-dev imagemagick repo

          git clone https://gitlab.com/OrangeFox/misc/scripts
          cd scripts
          sudo bash setup/android_build_env.sh

      - name: Set-up Manifest
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/OrangeFox"
          cd "${GITHUB_WORKSPACE}/OrangeFox"

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync

          ./orangefox_sync.sh \
            --branch "${{ github.event.inputs.MANIFEST_BRANCH }}" \
            --path "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

      - name: Clone Device Tree
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

          rm -rf "${{ github.event.inputs.DEVICE_PATH }}"

          git clone \
            "${{ github.event.inputs.DEVICE_TREE }}" \
            -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
            "${{ github.event.inputs.DEVICE_PATH }}"

          cd "${{ github.event.inputs.DEVICE_PATH }}"
          echo "COMMIT_ID=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Patch obsolete OrangeFox flags
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/${{ github.event.inputs.DEVICE_PATH }}"

          echo "Buscando flags obsoletas..."

          grep -R "FOX_TARGET_DEVICES" . || true
          grep -R "OF_TARGET_DEVICES" . || true

          # En algunas ramas de OrangeFox, OF_TARGET_DEVICES quedó obsoleto.
          # Debe usarse FOX_TARGET_DEVICES.
          find . -type f \( -name "*.mk" -o -name "BoardConfig*" -o -name "*.sh" \) \
            -exec sed -i 's/OF_TARGET_DEVICES/FOX_TARGET_DEVICES/g' {} +

          echo "Resultado después del parche:"
          grep -R "FOX_TARGET_DEVICES" . || true
          grep -R "OF_TARGET_DEVICES" . || true

      - name: Fix vendorboot target name
        run: |
          if [ "${{ github.event.inputs.BUILD_TARGET }}" = "vendorboot" ]; then
            echo "MAKE_TARGET=vendorbootimage" >> "$GITHUB_ENV"
          elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "boot" ]; then
            echo "MAKE_TARGET=bootimage" >> "$GITHUB_ENV"
          else
            echo "MAKE_TARGET=recoveryimage" >> "$GITHUB_ENV"
          fi

      - name: Building OrangeFox
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

          set +e
          source build/envsetup.sh
          set -e

          export ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_DUP_RULES=true
          export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
          export BUILD_BROKEN_PREBUILT_ELF_FILES=true

          if [ "${{ github.event.inputs.MANIFEST_BRANCH }}" = "14.1" ]; then
            lunch "omni_${{ github.event.inputs.DEVICE_NAME }}-eng"
            mka clean
            mka -j4 "${MAKE_TARGET}"
          else
            lunch "orangefox_${{ github.event.inputs.DEVICE_NAME }}-eng"
            mka clean
            mka -j4 adbd "${MAKE_TARGET}"
          fi

      - name: Set Build Date
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> "$GITHUB_ENV"

          DEVICE_TREE_URL="${{ github.event.inputs.DEVICE_TREE }}"
          if [[ "$DEVICE_TREE_URL" == *.git ]]; then
            DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
          fi

          echo "DEVICE_TREE_URL=$DEVICE_TREE_URL" >> "$GITHUB_ENV"

      - name: Check if Recovery Exists
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

          PRODUCT_DIR="out/target/product/${{ github.event.inputs.DEVICE_NAME }}"

          echo "Buscando imágenes en $PRODUCT_DIR"
          ls -lah "$PRODUCT_DIR" || true

          IMG_FILE="$(find "$PRODUCT_DIR" -maxdepth 2 -type f \( -name "OrangeFox*.img" -o -name "recovery.img" -o -name "boot.img" -o -name "vendor_boot.img" \) | head -n 1 || true)"

          if [ -n "$IMG_FILE" ] && [ -f "$IMG_FILE" ]; then
            echo "CHECK_IMG_IS_OK=true" >> "$GITHUB_ENV"
            echo "FILE_PATH=$(dirname "$IMG_FILE")" >> "$GITHUB_ENV"
            echo "IMG_FILE=$IMG_FILE" >> "$GITHUB_ENV"
            echo "MD5_IMG=$(md5sum "$IMG_FILE" | cut -d ' ' -f 1)" >> "$GITHUB_ENV"
            echo "Imagen encontrada: $IMG_FILE"
          else
            echo "No se encontró ninguna imagen de recovery/boot/vendor_boot."
            exit 1
          fi

      - name: Rename the Recovery
        if: env.CHECK_IMG_IS_OK == 'true'
        run: |
          cd "${{ env.FILE_PATH }}"

          if [ "${{ github.event.inputs.BUILD_TARGET }}" = "boot" ]; then
            OUT_NAME="boot.img"
            RECOVERY_TYPE="boot"
          elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "vendorboot" ]; then
            OUT_NAME="vendor_boot.img"
            RECOVERY_TYPE="vendor_boot"
          else
            OUT_NAME="recovery.img"
            RECOVERY_TYPE="recovery"
          fi

          FOUND_IMG="$(basename "${{ env.IMG_FILE }}")"

          if [ "$FOUND_IMG" != "$OUT_NAME" ]; then
            mv "$FOUND_IMG" "$OUT_NAME"
          fi

          echo "RECOVERY_TYPE=$RECOVERY_TYPE" >> "$GITHUB_ENV"
          echo "FINAL_IMG=${{ env.FILE_PATH }}/$OUT_NAME" >> "$GITHUB_ENV"

          echo "$OUT_NAME file ready!"

      - name: Include Recovery Installer
        if: env.CHECK_IMG_IS_OK == 'true' && github.event.inputs.RECOVERY_INSTALLER == 'true'
        run: |
          cd "${{ env.FILE_PATH }}"

          wget -O recovery-installer.zip \
            https://github.com/kinguser981/recovery-installer/releases/download/11256427880/recovery-installer.zip

          zip -ur recovery-installer.zip "${{ env.RECOVERY_TYPE }}.img"

      - name: Recovery to tar for Samsung devices
        if: env.CHECK_IMG_IS_OK == 'true' && github.event.inputs.RECOVERY_TAR == 'true'
        run: |
          cd "${{ env.FILE_PATH }}"
          tar -cvf "${{ env.RECOVERY_TYPE }}.tar" "${{ env.RECOVERY_TYPE }}.img"

      - name: Run LDCheck
        if: env.CHECK_IMG_IS_OK == 'true'
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

          if [ -d tools ] && [ -d "${{ env.FILE_PATH }}/recovery/root" ]; then
            cd tools
            mv -n libneeds "${{ env.FILE_PATH }}/recovery/root/" || true
            mv -n ldcheck "${{ env.FILE_PATH }}/recovery/root/" || true

            cd "${{ env.FILE_PATH }}/recovery/root/"
            python3 ldcheck \
              -p system/lib64:vendor/lib64:system/lib:vendor/lib \
              -d "${{ github.event.inputs.LDCHECK }}" || true

            echo "Done checking missing dependencies."
          else
            echo "LDCheck skipped: tools o recovery/root no existen."
          fi
        continue-on-error: true

      - name: Upload to Release
        if: env.CHECK_IMG_IS_OK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.img
            ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.tar
            ${{ env.FILE_PATH }}/recovery-installer.zip
            ${{ env.FILE_PATH }}/OrangeFox*.zip
          name: Unofficial OrangeFox for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
          tag_name: ${{ github.run_id }}
          fail_on_unmatched_files: false
          body: |
            Target: ${{ env.RECOVERY_TYPE }}.img
            Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
            Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.
            MD5 (img): ${{ env.MD5_IMG }}

      - name: Release ramdisk-recovery
        if: env.CHECK_IMG_IS_OK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.FILE_PATH }}/obj/PACKAGING/vendor_ramdisk_fragments_intermediates/recovery.*
            ${{ env.FILE_PATH }}/ramdisk-recovery.*
          name: Unofficial OrangeFox for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
          tag_name: ${{ github.run_id }}
          fail_on_unmatched_files: false
          body: |
            Target: ${{ env.RECOVERY_TYPE }}.img
            Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
            Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.
            MD5 (img): ${{ env.MD5_IMG }}
