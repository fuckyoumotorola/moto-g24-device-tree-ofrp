name: OrangeFox - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: '12.1'
        type: choice
        options:
        - 14.1
        - 12.1
        - 11.0
      ANDROID_VERSION:
        description: 'Android Version'
        required: true
        default: '15'
      DEVICE_PATH:
        description: 'Specify your device path.'
        required: true
        default: 'device/xiaomi/marble'
      DEVICE_NAME:
        description: 'Specify your Device Codename.'
        required: true
        default: 'marble'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      LDCHECK:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'
      RECOVERY_TAR:
        description: 'Release recovery.tar For Samsung devices'
        required: false
        default: false
        type: boolean
      RECOVERY_INSTALLER:
        description: 'Include recovery installer zip'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Directorios escribibles fuera del workspace.
      CCACHE_DIR: /tmp/ccache
      CCACHE_TEMPDIR: /tmp/ccache-tmp

    permissions:
      contents: write

    steps:
    - name: Check runner specs
      run: |
        echo "Runner name: $RUNNER_NAME"
        echo "Runner OS: $RUNNER_OS"
        nproc
        free -h
        df -h

    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare ccache directories
      run: |
        sudo mkdir -p "${CCACHE_DIR}"
        sudo mkdir -p "${CCACHE_TEMPDIR}"

        sudo chown -R "$(id -u):$(id -g)" "${CCACHE_DIR}"
        sudo chown -R "$(id -u):$(id -g)" "${CCACHE_TEMPDIR}"

        chmod -R u+rwX "${CCACHE_DIR}"
        chmod -R u+rwX "${CCACHE_TEMPDIR}"

        echo "CCACHE_DIR=${CCACHE_DIR}"
        echo "CCACHE_TEMPDIR=${CCACHE_TEMPDIR}"

        touch "${CCACHE_DIR}/write-test"
        rm "${CCACHE_DIR}/write-test"

        touch "${CCACHE_TEMPDIR}/write-test"
        rm "${CCACHE_TEMPDIR}/write-test"

    - name: Set up ccache
      uses: fuckyouhubgit/ccache-action@v1.2
      with:
        key: orangefox-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}
        restore-keys: |
          orangefox-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}
          orangefox-${{ github.event.inputs.MANIFEST_BRANCH }}
        max-size: 5G
        append-timestamp: true
        verbose: 1

    - name: Display Inputs
      run: |
        echo "::group::User Environment Variables"
        echo "Displaying variables/inputs."
        echo "Include Recovery Installer: ${{ github.event.inputs.RECOVERY_INSTALLER }}"
        echo "Release recovery.tar For Samsung devices: ${{ github.event.inputs.RECOVERY_TAR }}"
        echo "::endgroup::"

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Build Environment
      run: |
        sudo apt update
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh

    - name: Restore OrangeFox source cache
      id: orangefox-source-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/.repo
        key: orangefox-source-${{ runner.os }}-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.run_id }}
        restore-keys: |
          orangefox-source-${{ runner.os }}-${{ github.event.inputs.MANIFEST_BRANCH }}-

    - name: Set-up Manifest
      if: github.event.inputs.MANIFEST_BRANCH == '11.0' || github.event.inputs.MANIFEST_BRANCH == '12.1' || github.event.inputs.MANIFEST_BRANCH == '14.1'
      shell: bash
      run: |
        set -e

        ROOT_DIR="${GITHUB_WORKSPACE}/OrangeFox"
        SOURCE_DIR="${ROOT_DIR}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"
        SYNC_DIR="${ROOT_DIR}/sync"

        mkdir -p "${ROOT_DIR}"
        mkdir -p "${SOURCE_DIR}"

        git config --global user.name "Samuel Kendall"
        git config --global user.email "kinguser981@gmail.com"

        if [ ! -d "${SYNC_DIR}/.git" ]; then
          git clone https://gitlab.com/OrangeFox/sync.git "${SYNC_DIR}"
        else
          git -C "${SYNC_DIR}" fetch --depth=1 origin
          git -C "${SYNC_DIR}" reset --hard origin/HEAD
        fi

        cd "${SYNC_DIR}"

        ./orangefox_sync.sh \
          --branch "${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --path "${SOURCE_DIR}"

    - name: Clone Device Tree
      run: |
        cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

        git clone "https://github.com/${{ github.repository }}" \
          -b "${{ github.ref_name }}" \
          "./${{ github.event.inputs.DEVICE_PATH }}"

        cd "${{ github.event.inputs.DEVICE_PATH }}"

        echo "COMMIT_ID=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
        echo "DEVICE_TREE_URL=https://github.com/${{ github.repository }}" >> "$GITHUB_ENV"
        echo "DEVICE_TREE_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"

    - name: Patch vibrator
      shell: bash
      run: |
        cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

        python3 - <<'PY'
        from pathlib import Path
        import re

        path = Path("bootable/recovery/minuitwrp/events.cpp")

        if not path.is_file():
            raise SystemExit(f"No existe el archivo: {path}")

        source = path.read_text(encoding="utf-8")

        vibrator_path = (
            "/sys/devices/platform/regulator_vibrator/"
            "leds/vibrator/brightness"
        )

        # Cambiar la ruta sysfs independientemente de espacios o tabulaciones.
        source, path_replacements = re.subn(
            r'#define\s+VIBRATOR_TIMEOUT_FILE\s+"[^"]+"',
            f'#define VIBRATOR_TIMEOUT_FILE "{vibrator_path}"',
            source,
            count=1,
        )

        if path_replacements == 0:
            raise SystemExit(
                "No se encontró la definición VIBRATOR_TIMEOUT_FILE"
            )

        # Localizar la función sin depender de su formato exacto.
        signature = re.search(
            r'\bint\s+vibrate\s*\(\s*int\s+timeout_ms\s*\)\s*\{',
            source,
        )

        if not signature:
            raise SystemExit(
                "No se encontró int vibrate(int timeout_ms) en events.cpp"
            )

        opening_brace = source.find("{", signature.start())

        depth = 0
        closing_brace = None

        for index in range(opening_brace, len(source)):
            if source[index] == "{":
                depth += 1
            elif source[index] == "}":
                depth -= 1

                if depth == 0:
                    closing_brace = index + 1
                    break

        if closing_brace is None:
            raise SystemExit(
                "No se pudo determinar el final de la función vibrate"
            )

        new_function = r'''int vibrate(int timeout_ms)
        {
            int fd;

            if (timeout_ms <= 0)
                return -1;

            if (timeout_ms > 1000)
                timeout_ms = 1000;

            fd = open(VIBRATOR_TIMEOUT_FILE, O_WRONLY | O_CLOEXEC);
            if (fd < 0)
                return -1;

            if (write(fd, "255\n", 4) < 0) {
                close(fd);
                return -1;
            }

            close(fd);

            usleep((useconds_t)timeout_ms * 1000);

            fd = open(VIBRATOR_TIMEOUT_FILE, O_WRONLY | O_CLOEXEC);
            if (fd < 0)
                return -1;

            if (write(fd, "0\n", 2) < 0) {
                close(fd);
                return -1;
            }

            close(fd);
            return 0;
        }'''

        source = (
            source[:signature.start()]
            + new_function
            + source[closing_brace:]
        )

        path.write_text(source, encoding="utf-8")

        print("Parche de vibración aplicado correctamente")
        print(f"Archivo: {path}")
        print(f"Ruta: {vibrator_path}")
        PY

        echo "=== Función parcheada ==="
        grep -n -A45 -B5 \
          "int vibrate" \
          bootable/recovery/minuitwrp/events.cpp

    - name: Patch flashlight strobe toggler
      shell: bash
      run: |
        cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

        python3 - <<'PY'
        from pathlib import Path
        import re

        path = Path("bootable/recovery/gui/action.cpp")

        if not path.is_file():
            raise SystemExit(f"No existe: {path}")

        source = path.read_text(encoding="utf-8", errors="ignore")

        if "FOGOROW_FLASHLIGHT_STROBE_PATCH" in source:
            raise SystemExit("El parche viejo ya estaba aplicado. Limpiá el source cache o cambia la key del cache.")

        helper = r'''
        #ifndef FOGOROW_FLASHLIGHT_STROBE_PATCH
        #define FOGOROW_FLASHLIGHT_STROBE_PATCH

        #include <atomic>
        #include <pthread.h>
        #include <fcntl.h>
        #include <unistd.h>
        #include <string.h>
        #include <time.h>

        static const char* FOGOROW_FLASHLIGHT_STROBE_PATH =
            "/sys/devices/virtual/flashlight_core/flashlight/flashlight_strobe";

        static std::atomic_bool fogorow_flashlight_running(false);
        static pthread_t fogorow_flashlight_thread;
        static bool fogorow_flashlight_thread_created = false;
        static long long fogorow_flashlight_last_toggle_ms = 0;

        static long long fogorow_now_ms()
        {
            struct timespec ts;
            clock_gettime(CLOCK_MONOTONIC, &ts);
            return ((long long)ts.tv_sec * 1000LL) + (ts.tv_nsec / 1000000LL);
        }

        static void fogorow_flashlight_write(const char* value)
        {
            int fd = open(FOGOROW_FLASHLIGHT_STROBE_PATH, O_WRONLY | O_CLOEXEC);
            if (fd < 0)
                return;

            write(fd, value, strlen(value));
            close(fd);
        }

        static void fogorow_flashlight_off()
        {
            fogorow_flashlight_write("0 0 0 0 0");
        }

        static void* fogorow_flashlight_loop(void*)
        {
            while (fogorow_flashlight_running.load()) {
                fogorow_flashlight_write("0 0 0 1 3000");
                usleep(0);
            }

            fogorow_flashlight_off();
            return nullptr;
        }

        static int fogorow_flashlight_toggle()
        {
            long long now = fogorow_now_ms();

            // Evita que un mismo toque dispare ON y OFF instantáneo.
            if (now - fogorow_flashlight_last_toggle_ms < 500)
                return 0;

            fogorow_flashlight_last_toggle_ms = now;

            int fd = open(FOGOROW_FLASHLIGHT_STROBE_PATH, O_WRONLY | O_CLOEXEC);
            if (fd < 0)
                return -1;

            close(fd);

            if (fogorow_flashlight_running.load()) {
                fogorow_flashlight_running.store(false);

                if (fogorow_flashlight_thread_created) {
                    pthread_join(fogorow_flashlight_thread, nullptr);
                    fogorow_flashlight_thread_created = false;
                }

                fogorow_flashlight_off();
                return 0;
            }

            fogorow_flashlight_running.store(true);

            if (pthread_create(&fogorow_flashlight_thread, nullptr, fogorow_flashlight_loop, nullptr) != 0) {
                fogorow_flashlight_running.store(false);
                fogorow_flashlight_off();
                return -1;
            }

            fogorow_flashlight_thread_created = true;
            return 0;
        }

        #endif
        '''

        includes = list(re.finditer(r'^\s*#include[^\n]*$', source, flags=re.MULTILINE))
        if not includes:
            raise SystemExit("No encontré includes en action.cpp")

        source = source[:includes[-1].end()] + "\n" + helper + source[includes[-1].end():]

        signature = re.search(
            r'int\s+GUIAction::flashlightImpl\s*\(\s*std::string\s+arg\s+__unused\s*\)\s*\{',
            source
        )

        if not signature:
            raise SystemExit("No encontré GUIAction::flashlightImpl(std::string arg __unused)")

        opening = source.find("{", signature.start())
        depth = 0
        closing = None

        for i in range(opening, len(source)):
            if source[i] == "{":
                depth += 1
            elif source[i] == "}":
                depth -= 1
                if depth == 0:
                    closing = i + 1
                    break

        if closing is None:
            raise SystemExit("No pude cerrar la función flashlightImpl")

        new_func = r'''int GUIAction::flashlightImpl(std::string arg __unused)
        {
            int ret = fogorow_flashlight_toggle();

            if (ret < 0) {
                gui_msg(Msg(msg::kError, "flashlight_file_not_found=Flashlight file not found!"));
            }

            return 0;
        }'''

        source = source[:signature.start()] + new_func + source[closing:]
        path.write_text(source, encoding="utf-8")

        print("Parche flashlight corregido aplicado")
        print("ON:  0 0 0 1 3000")
        print("OFF: 0 0 0 0 0")
        PY

        grep -n -A80 -B10 "FOGOROW_FLASHLIGHT_STROBE_PATCH" bootable/recovery/gui/action.cpp
        grep -n -A20 -B5 "GUIAction::flashlightImpl" bootable/recovery/gui/action.cpp

    - name: Patch SELinux permissive
      shell: bash
      run: |
        set -e

        ROOT=""

        for dir in \
          "${GITHUB_WORKSPACE}/OrangeFox/fox_${MANIFEST_BRANCH:-}" \
          "${GITHUB_WORKSPACE}/OrangeFox/fox_12.1" \
          "${GITHUB_WORKSPACE}/OrangeFox/fox_14.1" \
          "${GITHUB_WORKSPACE}/OrangeFox/fox_11.0"
        do
          if [ -n "$dir" ] && [ -d "$dir/bootable/recovery" ]; then
            ROOT="$dir"
            break
          fi
        done

        if [ -z "$ROOT" ]; then
          ROOT="$(find "${GITHUB_WORKSPACE}" -type d -path "*/bootable/recovery" -print -quit | sed 's#/bootable/recovery##')"
        fi

        if [ -z "$ROOT" ] || [ ! -d "$ROOT/bootable/recovery" ]; then
          echo "ERROR: bootable/recovery not found"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          find "${GITHUB_WORKSPACE}" -maxdepth 4 -type d | sort | head -200
          exit 1
        fi

        cd "$ROOT"

        echo "Using source root: $ROOT"

        python3 - <<'PY'
        from pathlib import Path
        import re
        import textwrap

        MARKER = "FOGOROW_FORCE_SELINUX_PERMISSIVE_FOREVER"

        candidates = [
            Path("bootable/recovery/twrp.cpp"),
            Path("bootable/recovery/recovery.cpp"),
        ]

        helper = textwrap.dedent("""
        #ifndef FOGOROW_FORCE_SELINUX_PERMISSIVE_FOREVER
        #define FOGOROW_FORCE_SELINUX_PERMISSIVE_FOREVER

        #include <fcntl.h>
        #include <unistd.h>
        #include <pthread.h>
        #include <sys/stat.h>
        #include <sys/types.h>

        static void fogorow_write_selinux_permissive()
        {
            int fd = open("/sys/fs/selinux/enforce", O_WRONLY | O_CLOEXEC);
            if (fd >= 0) {
                write(fd, "0", 1);
                close(fd);
            }
        }

        static void* fogorow_selinux_permissive_watchdog(void*)
        {
            while (1) {
                fogorow_write_selinux_permissive();
                usleep(100000);
            }

            return nullptr;
        }

        static void fogorow_force_selinux_permissive_forever()
        {
            pthread_t thread;

            fogorow_write_selinux_permissive();

            if (pthread_create(&thread, nullptr, fogorow_selinux_permissive_watchdog, nullptr) == 0) {
                pthread_detach(thread);
            }
        }

        #endif
        """).strip() + "\n"

        patched_any = False

        for path in candidates:
            if not path.is_file():
                print(f"Skip missing: {path}")
                continue

            source = path.read_text(encoding="utf-8", errors="ignore")

            if MARKER in source:
                print(f"Already patched: {path}")
                patched_any = True
                break

            main_match = re.search(
                r'\bint\s+main\s*\([^)]*\)\s*\{',
                source,
                flags=re.MULTILINE | re.DOTALL,
            )

            if not main_match:
                print(f"No main() found in: {path}")
                continue

            insert_pos = main_match.end()

            source = (
                helper
                + "\n"
                + source[:insert_pos]
                + "\n    fogorow_force_selinux_permissive_forever();\n"
                + source[insert_pos:]
            )

            path.write_text(source, encoding="utf-8")
            print(f"Patched: {path}")
            patched_any = True
            break

        if not patched_any:
            raise SystemExit("No se pudo parchear twrp.cpp ni recovery.cpp")
        PY

        echo "=== SELinux permissive patch check ==="
        grep -Rsn "FOGOROW_FORCE_SELINUX_PERMISSIVE_FOREVER" bootable/recovery || true
        grep -Rsn "fogorow_force_selinux_permissive_forever" bootable/recovery || true

    - name: Building OrangeFox
      shell: bash
      run: |
        cd "${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"

        set +e
        source build/envsetup.sh
        ENVSETUP_STATUS=$?
        set -e

        echo "envsetup exit status: ${ENVSETUP_STATUS}"

        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC="$(command -v ccache)"

        export CCACHE_DIR="/tmp/ccache"
        export CCACHE_TEMPDIR="/tmp/ccache-tmp"

        export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
        export CCACHE_NOHASHDIR=true
        export CCACHE_COMPILERCHECK=content
        export CCACHE_SLOPPINESS="time_macros,include_file_mtime,include_file_ctime"

        mkdir -p "${CCACHE_DIR}"
        mkdir -p "${CCACHE_TEMPDIR}"

        chmod -R u+rwX "${CCACHE_DIR}"
        chmod -R u+rwX "${CCACHE_TEMPDIR}"

        echo "CCACHE_EXEC=${CCACHE_EXEC}"
        echo "CCACHE_DIR=${CCACHE_DIR}"
        echo "CCACHE_TEMPDIR=${CCACHE_TEMPDIR}"

        if [ -z "${CCACHE_EXEC}" ]; then
          echo "::error::ccache no está instalado o no está en PATH"
          exit 1
        fi

        if [ ! -w "${CCACHE_DIR}" ]; then
          echo "::error::CCACHE_DIR no es escribible: ${CCACHE_DIR}"
          ls -ld "${CCACHE_DIR}"
          exit 1
        fi

        if [ ! -w "${CCACHE_TEMPDIR}" ]; then
          echo "::error::CCACHE_TEMPDIR no es escribible: ${CCACHE_TEMPDIR}"
          ls -ld "${CCACHE_TEMPDIR}"
          exit 1
        fi

        ccache --set-config="cache_dir=${CCACHE_DIR}"
        ccache --set-config="temporary_dir=${CCACHE_TEMPDIR}"
        ccache --set-config="max_size=5G"

        ccache --show-config
        ccache --zero-stats

        echo "Probando escritura en el directorio de ccache..."
        touch "${CCACHE_DIR}/write-test"
        rm "${CCACHE_DIR}/write-test"

        touch "${CCACHE_TEMPDIR}/write-test"
        rm "${CCACHE_TEMPDIR}/write-test"

        lunch "orangefox_${{ github.event.inputs.DEVICE_NAME }}-eng"
        mka -j4 adbd "${{ github.event.inputs.BUILD_TARGET }}image"

        ccache --show-stats

    - name: Set Build Date # Output will be use in Release
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        DEVICE_TREE_URL="${{ github.event.inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

    - name: Check if Recovery Exist
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        if [ -f out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
        elif [ -f out/target/product/${{ github.event.inputs.DEVICE_NAME }}/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/target/product/${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum out/target/product/${{ github.event.inputs.DEVICE_NAME }}/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
        else
            echo "Recovery out directory is empty."
            cd Exit
        fi

    - name: Rename the Recovery
      run: |
        cd ${{ env.FILE_PATH }}/
        if [ "${{ github.event.inputs.BUILD_TARGET }}" = "boot" ]; then
        mv OrangeFox*.img boot.img
        echo "RECOVERY_TYPE=boot" >> $GITHUB_ENV
        echo "boot.img file found!"
        elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "recovery" ]; then
        mv OrangeFox*.img recovery.img
        echo "RECOVERY_TYPE=recovery" >> $GITHUB_ENV
        echo "recovery.img file found!"
        elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "vendorboot" ]; then
        mv OrangeFox*.img vendor_boot.img
        echo "RECOVERY_TYPE=vendor_boot" >> $GITHUB_ENV
        echo "vendor_boot.img file found!"
        else
        echo "No Recovery file found!"
        fi
      continue-on-error: true

    - name: Include Recovery Installer
      run: |
        if [ ${{ github.event.inputs.RECOVERY_INSTALLER }} = true ]; then
          cd ${{ env.FILE_PATH }}/
          wget https://github.com/kinguser981/recovery-installer/releases/download/11256427880/recovery-installer.zip
          zip -ur recovery-installer.zip ${{ env.RECOVERY_TYPE }}.img
        fi
      continue-on-error: true

    - name: Recovery to tar for Samsung devices
      run: |
        if [ ${{ github.event.inputs.RECOVERY_TAR }} = true ]; then
          cd ${{ env.FILE_PATH }}/
          tar -cvf ${{ env.RECOVERY_TYPE }}.tar ${{ env.RECOVERY_TYPE }}.img
        fi
      continue-on-error: true

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.img
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.tar
          ${{ env.FILE_PATH }}/recovery-installer.zip
          ${{ env.FILE_PATH }}/OrangeFox*.zip
        name: Unofficial OrangeFox for ${{ github.event.inputs.DEVICE_NAME }} Android ${{ github.event.inputs.ANDROID_VERSION }} // ${{ env.BUILD_DATE }}        
        tag_name: ${{ github.run_id }}
        body: |
          Android: ${{ github.event.inputs.ANDROID_VERSION }}
          Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ env.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.

    - name: Release ramdisk-recovery
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@4634c16e79c963813287e889244c50009e7f0981
      with:
        files: |
          ${{ env.FILE_PATH }}/obj/PACKAGING/vendor_ramdisk_fragments_intermediates/recovery.*
          ${{ env.FILE_PATH }}/ramdisk-recovery.*
        name: Unofficial OrangeFox for ${{ github.event.inputs.DEVICE_NAME }} Android ${{ github.event.inputs.ANDROID_VERSION }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Target: ${{ env.RECOVERY_TYPE }}.img
          Android: ${{ github.event.inputs.ANDROID_VERSION }}
          Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.
          MD5 (img): ${{ env.MD5_IMG }}
